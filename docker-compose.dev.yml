# ローカル開発用: PostgreSQLのみ起動
# バックエンドとフロントエンドはローカルで直接起動する
#
# 使用方法:
#   docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rustruct
      POSTGRES_USER: rustruct
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustruct"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
